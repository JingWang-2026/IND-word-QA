services:
  backend:
    build:
      context: ./backend
    environment:
      WORD_QA_FRONTEND_ORIGINS: http://localhost:5175,http://127.0.0.1:5175
    ports:
      - "8011:8011"
    volumes:
      - ./storage:/app/storage
  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8011
    ports:
      - "5175:5175"
    depends_on:
      - backend
